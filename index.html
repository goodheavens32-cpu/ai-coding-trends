<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test</title>
</head>
<body style="background:#111;color:#fff;font-family:sans-serif;padding:20px">

<h2>ボタンテスト</h2>
<p id="msg" style="color:yellow;font-size:18px">まだ押していない</p>
<button onclick="test1()" style="padding:16px 32px;font-size:18px;margin:10px;display:block;width:100%">
  テスト1: ボタン動作確認
</button>

<h2 style="margin-top:20px">APIテスト</h2>
<input id="key" type="text" placeholder="APIキーを貼り付け" 
  style="width:100%;padding:12px;font-size:14px;margin-bottom:10px;display:block;background:#222;color:#fff;border:1px solid #555;border-radius:6px">
<button onclick="test2()" style="padding:16px 32px;font-size:18px;margin:10px;display:block;width:100%;background:#1f6feb;color:#fff;border:none;border-radius:8px">
  テスト2: API接続確認
</button>
<p id="result" style="color:#7ec8e3;margin-top:10px;word-break:break-all"></p>

<script>
function test1() {
  document.getElementById('msg').textContent = '✅ ボタンは動いています！';
  document.getElementById('msg').style.color = '#56d364';
}

function test2() {
  var key = document.getElementById('key').value.trim();
  document.getElementById('result').textContent = '送信中... キー=' + key.slice(0,8) + '...';
  
  fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=' + key, {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({contents:[{parts:[{text:'「テスト成功」とだけ返してください'}]}]})
  })
  .then(function(r){ return r.json(); })
  .then(function(d){
    if(d.error) {
      document.getElementById('result').textContent = '❌ APIエラー: ' + d.error.message;
    } else {
      document.getElementById('result').textContent = '✅ API成功: ' + d.candidates[0].content.parts[0].text;
    }
  })
  .catch(function(e){
    document.getElementById('result').textContent = '❌ 通信エラー: ' + e.message;
  });
}
</script>

</body>
</html>
